let activeMethod = 'all';
let activeType = 'all';

function tagHTML(tagKey) {
  const m = TAG_META[tagKey];
  if (!m) return '';
  return `<div class="card-tag ${m.cls}">${m.icon ? `<i class="ti ${m.icon}" style="font-size:11px;"></i>` : ''}${m.label}</div>`;
}

function renderCards() {
  const grid = document.getElementById('cardsGrid');
  grid.innerHTML = '';
  let count = 0;
  Object.entries(recipes).forEach(([id, r]) => {
    const hasMethod = activeMethod === 'all' || r.tags.includes(activeMethod);
    const hasType   = activeType  === 'all' || r.tags.includes(activeType);
    if (!hasMethod || !hasType) return;
    count++;
    const tagsHtml = r.tags.map(tagHTML).join('');
    const metaTime = r.time ? `<div class="meta-item"><i class="ti ti-clock" style="font-size:13px;"></i> ${r.time}</div>` : '';
    const metaTemp = r.temp ? `<div class="meta-item"><i class="ti ti-temperature" style="font-size:13px;"></i> ${r.temp}</div>` : '';
    const metaServ = r.servings ? `<div class="meta-item"><i class="ti ti-users" style="font-size:13px;"></i> ${r.servings}</div>` : '';
    grid.innerHTML += `
      <div class="recipe-card" onclick="openRecipe('${id}')">
        <div class="card-tags">${tagsHtml}</div>
        <div class="card-title">${r.title}</div>
        <div class="card-desc">${r.desc}</div>
        <div class="card-meta">${metaTime}${metaTemp}${metaServ}</div>
      </div>`;
  });
  document.getElementById('noResults').style.display = count === 0 ? '' : 'none';
  const total = Object.keys(recipes).length;
  document.getElementById('recipeCount').textContent = `${total} рецептов · показано ${count}`;
}

function renderFilterBtns() {
  const mf = document.getElementById('methodFilters');
  const tf = document.getElementById('typeFilters');
  mf.innerHTML = `<button class="filter-btn ${activeMethod==='all'?'active':''}" onclick="setMethod('all',this)">Все</button>`;
  METHOD_TAGS.forEach(t => {
    mf.innerHTML += `<button class="filter-btn ${activeMethod===t?'active':''}" onclick="setMethod('${t}',this)">${TAG_META[t].label}</button>`;
  });
  tf.innerHTML = `<button class="filter-btn ${activeType==='all'?'active':''}" onclick="setType('all',this)">Все</button>`;
  TYPE_TAGS.forEach(t => {
    tf.innerHTML += `<button class="filter-btn ${activeType===t?'active':''}" onclick="setType('${t}',this)">${TAG_META[t].label}</button>`;
  });
}

function setMethod(val) {
  activeMethod = val;
  renderFilterBtns();
  renderCards();
}
function setType(val) {
  activeType = val;
  renderFilterBtns();
  renderCards();
}

function openRecipe(id) {
  const r = recipes[id];
  document.getElementById('listView').classList.add('hidden');
  const dv = document.getElementById('detailView');
  dv.classList.add('open');
  const tagsHtml = r.tags.map(tagHTML).join('');
  const ingHtml = r.ingredients.map(i =>
    `<div class="ingredient-item"><span>${i.amount}</span>${i.name}</div>`).join('');
  const stepsHtml = r.steps.map((s,i) =>
    `<li class="step-item"><div class="step-num">${i+1}</div><div class="step-text">${s}</div></li>`).join('');
  const tipsHtml = r.tips.map(t => `<div class="tip-item">${t}</div>`).join('');
  const metaTime = r.time ? `<div class="meta-item"><i class="ti ti-clock" style="font-size:13px;"></i> ${r.time}</div>` : '';
  const metaTemp = r.temp ? `<div class="meta-item"><i class="ti ti-temperature" style="font-size:13px;"></i> ${r.temp}</div>` : '';
  const metaServ = r.servings ? `<div class="meta-item"><i class="ti ti-users" style="font-size:13px;"></i> ${r.servings}</div>` : '';
  dv.innerHTML = `
    <button class="back-btn" onclick="closeRecipe()"><i class="ti ti-arrow-left" style="font-size:15px;"></i> Все рецепты</button>
    <div class="detail-card">
      <div class="detail-tags">${tagsHtml}</div>
      <div class="detail-title">${r.title}</div>
      <div class="detail-meta">${metaTime}${metaTemp}${metaServ}</div>
      <div class="section-label">Ингредиенты</div>
      <div class="ingredients-grid">${ingHtml}</div>
      <div class="section-label">Приготовление</div>
      <ol class="steps-list">${stepsHtml}</ol>
      <div class="section-label">Советы</div>
      <div class="tips-list">${tipsHtml}</div>
    </div>`;
  dv.scrollIntoView({behavior:'smooth',block:'start'});
}

function closeRecipe() {
  document.getElementById('listView').classList.remove('hidden');
  document.getElementById('detailView').classList.remove('open');
  document.getElementById('detailView').innerHTML = '';
}

renderFilterBtns();
renderCards();
</script>
